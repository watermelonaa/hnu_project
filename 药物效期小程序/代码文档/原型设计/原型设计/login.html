<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>药物效期管家 - 微信授权登录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Alibaba PuHuiTi", "PingFang SC", "Helvetica Neue", sans-serif;
      background: radial-gradient(circle at top, #dfe9ff 0, #f3f6ff 40%, #eef2f8 100%);
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: #1f2937;
    }
    .phone {
      width: 393px;
      height: 852px;
      border-radius: 52px;
      background: linear-gradient(180deg, #22252b 0%, #13161b 100%);
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.35);
      padding: 12px;
      position: relative;
      overflow: hidden;
      border: 1px solid #0f1115;
    }
    .screen {
      width: 100%;
      height: 100%;
      border-radius: 40px;
      background: #f6f8fc;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .screen::before {
      content: "";
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 116px;
      height: 28px;
      border-radius: 18px;
      background: #0f1115;
      z-index: 3;
    }
    .status {
      height: 46px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 22px;
      font-size: 14px;
      font-weight: 600;
      background: #f6f8fc;
    }
    .status .icons i { margin-left: 8px; }
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 24px 60px;
    }
    .logo {
      text-align: center;
      margin-bottom: 40px;
    }
    .logo-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #2f80ed, #56ccf2);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      box-shadow: 0 12px 24px rgba(47, 128, 237, 0.25);
    }
    .logo-icon i {
      font-size: 40px;
      color: #fff;
    }
    .logo h1 {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #1e293b, #2f80ed);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .logo p {
      font-size: 13px;
      color: #64748b;
      margin-top: 8px;
    }
    .auth-buttons {
      margin-top: 20px;
    }
    .wx-login-btn {
      width: 100%;
      background: linear-gradient(135deg, #07c160, #06ad56);
      border: none;
      border-radius: 60px;
      padding: 16px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(7, 193, 96, 0.3);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .wx-login-btn:active {
      transform: scale(0.97);
      box-shadow: 0 4px 12px rgba(7, 193, 96, 0.3);
    }
    .wx-login-btn i {
      font-size: 24px;
      color: #fff;
    }
    .wx-login-btn span {
      font-size: 17px;
      font-weight: 600;
      color: #fff;
    }
    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 24px 0;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: #e2e8f0;
    }
    .divider-text {
      font-size: 12px;
      color: #94a3b8;
    }
    .phone-login-btn {
      width: 100%;
      background: #fff;
      border: 1px solid #d1d9e8;
      border-radius: 60px;
      padding: 14px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .phone-login-btn:active {
      background: #f1f5f9;
    }
    .phone-login-btn i {
      font-size: 18px;
      color: #2f80ed;
    }
    .phone-login-btn span {
      font-size: 15px;
      font-weight: 500;
      color: #334155;
    }
    .agreement {
      text-align: center;
      margin-top: 32px;
      font-size: 11px;
      color: #94a3b8;
    }
    .agreement a {
      color: #2f80ed;
      text-decoration: none;
    }
    .home-indicator {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 10px;
      width: 128px;
      height: 5px;
      border-radius: 999px;
      background: rgba(17, 24, 39, 0.75);
      z-index: 5;
    }
    /* 隐私弹窗 */
    .privacy-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .privacy-overlay.show {
      display: flex;
    }
    .privacy-modal {
      background: #fff;
      border-radius: 32px;
      width: 300px;
      padding: 24px 20px;
      text-align: center;
      animation: fadeInUp 0.3s ease;
    }
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .privacy-modal i {
      font-size: 48px;
      color: #2f80ed;
      margin-bottom: 16px;
    }
    .privacy-modal h3 {
      font-size: 18px;
      margin-bottom: 12px;
    }
    .privacy-modal p {
      font-size: 13px;
      color: #64748b;
      line-height: 1.5;
      margin-bottom: 20px;
    }
    .privacy-buttons {
      display: flex;
      gap: 12px;
    }
    .privacy-buttons button {
      flex: 1;
      padding: 10px 0;
      border-radius: 60px;
      border: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    .btn-disagree {
      background: #f1f5f9;
      color: #64748b;
    }
    .btn-agree {
      background: #07c160;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="screen">
      <div class="status">
        <span>9:41</span>
        <div class="icons">
          <i class="fa-solid fa-signal"></i>
          <i class="fa-solid fa-wifi"></i>
          <i class="fa-solid fa-battery-full"></i>
        </div>
      </div>
      
      <div class="content">
        <div class="logo">
          <div class="logo-icon">
            <i class="fa-solid fa-pills"></i>
          </div>
          <h1>药物效期管家</h1>
          <p>智能管理 · 用药安心</p>
        </div>

        <div class="auth-buttons">
          <!-- 微信授权登录按钮 -->
          <button class="wx-login-btn" id="wxLoginBtn">
            <i class="fa-brands fa-weixin"></i>
            <span>微信授权登录</span>
          </button>

          <div class="divider">
            <div class="divider-line"></div>
            <span class="divider-text">其他方式</span>
            <div class="divider-line"></div>
          </div>

          <!-- 手机号登录（备用） -->
          <button class="phone-login-btn" id="phoneLoginBtn">
            <i class="fa-solid fa-mobile-alt"></i>
            <span>手机号登录</span>
          </button>
        </div>

        <div class="agreement">
          登录即表示同意
          <a href="privacy.html">《用户协议》</a>
          和
          <a href="privacy.html">《隐私政策》</a>
        </div>
      </div>

      <!-- 隐私授权弹窗 -->
      <div id="privacyOverlay" class="privacy-overlay">
        <div class="privacy-modal">
          <i class="fa-solid fa-shield-heart"></i>
          <h3>隐私授权</h3>
          <p>我们将获取您的微信昵称和头像，用于完善个人资料。您的药物数据将安全存储，仅用于效期管理。</p>
          <div class="privacy-buttons">
            <button class="btn-disagree" id="disagreeBtn">暂不授权</button>
            <button class="btn-agree" id="agreeBtn">同意授权</button>
          </div>
        </div>
      </div>

      <div class="home-indicator"></div>
    </div>
  </div>

  <script>
    // 模拟微信小程序环境检测
    const isWechatEnv = /MicroMessenger/i.test(navigator.userAgent);
    
    // DOM 元素
    const wxLoginBtn = document.getElementById('wxLoginBtn');
    const phoneLoginBtn = document.getElementById('phoneLoginBtn');
    const privacyOverlay = document.getElementById('privacyOverlay');
    const disagreeBtn = document.getElementById('disagreeBtn');
    const agreeBtn = document.getElementById('agreeBtn');
    
    let pendingLoginCallback = null;

    // 显示隐私授权弹窗
    function showPrivacyModal(callback) {
      pendingLoginCallback = callback;
      privacyOverlay.classList.add('show');
    }

    // 隐藏隐私授权弹窗
    function hidePrivacyModal() {
      privacyOverlay.classList.remove('show');
      pendingLoginCallback = null;
    }

    // 模拟微信登录（实际小程序中应调用 wx.login + wx.getUserProfile）
    function wechatLogin() {
      // 模拟登录加载状态
      wxLoginBtn.disabled = true;
      wxLoginBtn.style.opacity = '0.7';
      wxLoginBtn.innerHTML = '<i class="fa-solid fa-spinner fa-pulse"></i><span>登录中...</span>';
      
      // 模拟网络请求延迟
      setTimeout(() => {
        // 模拟获取用户信息
        const mockUserInfo = {
          nickName: "用药小助手",
          avatarUrl: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=120&q=80",
          openId: "mock_openid_" + Date.now()
        };
        
        // 存储用户登录信息
        localStorage.setItem("userInfo", JSON.stringify(mockUserInfo));
        localStorage.setItem("isLogin", "true");
        localStorage.setItem("loginTime", Date.now());
        
        // 重置按钮状态
        wxLoginBtn.disabled = false;
        wxLoginBtn.style.opacity = '1';
        wxLoginBtn.innerHTML = '<i class="fa-brands fa-weixin"></i><span>微信授权登录</span>';
        
        // 跳转到首页
        window.location.href = "home.html";
      }, 800);
    }

    // 手机号登录（跳转到传统登录页）
    function phoneLogin() {
      window.location.href = "phone-login.html";
    }

    // 微信授权登录按钮点击事件
    wxLoginBtn.addEventListener('click', () => {
      if (isWechatEnv) {
        // 在微信环境中，显示隐私授权弹窗，然后调用微信授权
        showPrivacyModal(() => {
          // 实际小程序中这里应该调用 wx.getUserProfile
          console.log('用户同意隐私协议，开始微信授权');
          wechatLogin();
        });
      } else {
        // 非微信环境（浏览器调试），直接模拟登录并显示提示
        showPrivacyModal(() => {
          alert('当前为网页预览模式，模拟微信登录成功');
          wechatLogin();
        });
      }
    });

    // 手机号登录按钮
    phoneLoginBtn.addEventListener('click', () => {
      phoneLogin();
    });

    // 同意授权
    agreeBtn.addEventListener('click', () => {
      if (pendingLoginCallback) {
        pendingLoginCallback();
      }
      hidePrivacyModal();
    });

    // 不同意授权
    disagreeBtn.addEventListener('click', () => {
      hidePrivacyModal();
      // 可显示轻提示
      console.log('用户不同意隐私授权');
    });

    // 点击遮罩层关闭弹窗
    privacyOverlay.addEventListener('click', (e) => {
      if (e.target === privacyOverlay) {
        hidePrivacyModal();
      }
    });

    // 检查是否已登录（如果已登录且未过期，自动跳转首页）
    const isLogin = localStorage.getItem("isLogin");
    const loginTime = localStorage.getItem("loginTime");
    if (isLogin === "true" && loginTime) {
      const sevenDays = 7 * 24 * 60 * 60 * 1000;
      if (Date.now() - parseInt(loginTime) < sevenDays) {
        // 已登录且未过期，跳转首页
        // window.location.href = "home.html";
      }
    }
  </script>
</body>
</html>
