<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>药物效期管家 - 设置</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Alibaba PuHuiTi", "PingFang SC", "Helvetica Neue", sans-serif; background: #eef2fb; min-height: 100vh; display: grid; place-items: center; color: #1f2937; }
    .phone { width: 393px; height: 852px; border-radius: 52px; padding: 12px; background: linear-gradient(180deg, #22252b 0%, #13161b 100%); box-shadow: 0 24px 70px rgba(15, 23, 42, 0.35); border: 1px solid #0f1115; }
    .screen { width: 100%; height: 100%; border-radius: 40px; background: #f5f8fd; overflow: hidden; position: relative; }
    .screen::before { content:""; position:absolute; top:8px; left:50%; transform:translateX(-50%); width:116px; height:28px; border-radius:18px; background:#0f1115; z-index:3; }
    .status { height: 44px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; font-size: 14px; font-weight: 600; }
    .status .icons { display: flex; align-items: center; gap: 8px; }
    .head { padding: 8px 16px; display: flex; align-items: center; gap: 10px; font-size: 20px; font-weight: 700; }
    .content { padding: 8px 16px; }
    .group { background: #fff; border-radius: 16px; margin-bottom: 10px; overflow: hidden; box-shadow: 0 8px 20px rgba(15,23,42,.05); }
    .row {
      padding: 14px 12px; display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid #eef2f7; font-size: 14px;
      cursor: pointer;
    }
    .row:last-child { border-bottom: none; }
    .left { display: flex; align-items: center; gap: 10px; }
    .left i { width: 18px; text-align: center; color: #3b82f6; }
    .switch {
      width: 44px; height: 24px; border-radius: 999px; background: #d1d5db;
      position: relative;
    }
    .switch.on { background: #22c55e; }
    .dot {
      width: 20px; height: 20px; border-radius: 50%; background: #fff;
      position: absolute; top: 2px; left: 2px;
      box-shadow: 0 2px 6px rgba(0,0,0,.2);
    }
    .switch.on .dot { left: 22px; }
    .logout {
      margin-top: 16px; width: 100%; border: none; border-radius: 14px; padding: 13px 0;
      background: #ef4444; color: #fff; font-size: 15px; font-weight: 600;
    }
    .time-input {
      border: 1px solid #dbe4f3; border-radius: 10px; padding: 6px 10px; font-size: 14px;
      font-family: inherit; color: #334155; background: #f8fafc; cursor: pointer;
    }
    .home-indicator { position:absolute; left:50%; transform:translateX(-50%); bottom:6px; width:128px; height:5px; border-radius:999px; background:rgba(17,24,39,.75); z-index:5; }
  </style>
</head>
<body>
  <div class="phone">
    <div class="screen">
      <div class="status">
        <span>9:41</span>
        <div class="icons"><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-full"></i></div>
      </div>
      <div class="head"><i class="fa-solid fa-angle-left" onclick="window.location.href='profile.html'" style="cursor:pointer;"></i><span>设置</span></div>
      <div class="content">
        <div class="group">
          <div class="row"><div class="left"><i class="fa-regular fa-bell"></i><span>过期提醒推送</span></div><div class="switch on"><span class="dot"></span></div></div>
          <div class="row" id="remindTimeRow"><div class="left"><i class="fa-solid fa-clock"></i><span>提醒时间</span></div><input type="time" class="time-input" id="remindTime" value="08:30" /></div>
        </div>
        <div class="group">
          <div class="row" data-click-msg="语言设置入口（原型）"><div class="left"><i class="fa-solid fa-language"></i><span>语言</span></div><span style="color:#64748b;">简体中文</span></div>
          <div class="row"><div class="left"><i class="fa-solid fa-cloud-arrow-up"></i><span>数据同步</span></div><div class="switch on"><span class="dot"></span></div></div>
        </div>
        <button class="logout" onclick="window.location.href='login.html'" style="cursor:pointer;">退出当前账号</button>
      </div>
      <div class="home-indicator"></div>
    </div>
  </div>
  <script>
    document.querySelectorAll(".switch").forEach(function (sw) {
      sw.addEventListener("click", function (e) {
        e.stopPropagation();
        sw.classList.toggle("on");
      });
    });

    document.querySelectorAll("[data-click-msg]").forEach(function (row) {
      row.addEventListener("click", function () {
        alert(row.dataset.clickMsg);
      });
    });

    (function () {
      var input = document.getElementById("remindTime");
      var saved = localStorage.getItem("remindTime");
      if (saved) input.value = saved;
      input.addEventListener("change", function () {
        localStorage.setItem("remindTime", input.value);
      });
      document.getElementById("remindTimeRow").addEventListener("click", function (e) {
        if (e.target === input) return;
        try {
          if (typeof input.showPicker === "function") input.showPicker();
          else input.focus();
        } catch (err) {
          input.focus();
        }
      });
    })();
  </script>
</body>
</html>
