<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>药物效期管家 - 隐私协议</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Alibaba PuHuiTi", "PingFang SC", "Helvetica Neue", sans-serif; background: #edf2fb; min-height: 100vh; display: grid; place-items: center; color: #1f2937; }
    .phone { width: 393px; height: 852px; border-radius: 52px; padding: 12px; background: linear-gradient(180deg, #22252b 0%, #13161b 100%); box-shadow: 0 24px 70px rgba(15, 23, 42, 0.35); border: 1px solid #0f1115; }
    .screen { width: 100%; height: 100%; border-radius: 40px; background: #f5f8fd; overflow: hidden; position: relative; }
    .screen::before { content:""; position:absolute; top:8px; left:50%; transform:translateX(-50%); width:116px; height:28px; border-radius:18px; background:#0f1115; z-index:3; }
    .status { height: 44px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; font-size: 14px; font-weight: 600; }
    .status .icons { display: flex; align-items: center; gap: 8px; }
    .head { padding: 8px 16px; display: flex; align-items: center; gap: 10px; font-size: 20px; font-weight: 700; }
    .content { padding: 8px 16px; height: 730px; overflow: auto; }
    .card { background: #fff; border-radius: 16px; padding: 14px; box-shadow: 0 8px 20px rgba(15,23,42,.05); }
    .card h4 { margin-bottom: 8px; }
    .card p { font-size: 13px; color: #64748b; line-height: 1.7; margin-bottom: 8px; }
    .home-indicator { position:absolute; left:50%; transform:translateX(-50%); bottom:6px; width:128px; height:5px; border-radius:999px; background:rgba(17,24,39,.75); z-index:5; }
  </style>
</head>
<body>
  <div class="phone">
    <div class="screen">
      <div class="status">
        <span>9:41</span>
        <div class="icons"><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-full"></i></div>
      </div>
      <div class="head"><i class="fa-solid fa-angle-left" onclick="window.location.href='profile.html'" style="cursor:pointer;"></i><span>隐私协议</span></div>
      <div class="content">
        <div class="card">
          <h4>隐私说明（原型示例）</h4>
          <p>我们仅在提供功能所必需范围内收集数据，包括账号信息、药物录入记录和消息提醒设置。</p>
          <p>拍照与语音内容仅用于识别和结构化解析，不会在未经授权情况下对外共享。</p>
          <p>你可以在设置页关闭提醒推送或数据同步功能。</p>
        </div>
      </div>
      <div class="home-indicator"></div>
    </div>
  </div>
</body>
</html>
