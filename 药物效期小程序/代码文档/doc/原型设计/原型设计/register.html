<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>药物效期管家 - 注册</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Alibaba PuHuiTi", "PingFang SC", "Helvetica Neue", sans-serif; background: radial-gradient(circle at top, #dfe9ff 0, #f3f6ff 40%, #eef2f8 100%); min-height: 100vh; display: grid; place-items: center; }
    .phone { width: 393px; height: 852px; border-radius: 52px; background: linear-gradient(180deg, #22252b 0%, #13161b 100%); box-shadow: 0 24px 70px rgba(15, 23, 42, 0.35); border: 1px solid #0f1115; padding: 12px; overflow: hidden; }
    .screen { width: 100%; height: 100%; border-radius: 40px; background: #f6f8fc; overflow: hidden; position: relative; }
    .screen::before { content:""; position:absolute; top:8px; left:50%; transform:translateX(-50%); width:116px; height:28px; border-radius:18px; background:#0f1115; z-index:3; }
    .status { height: 46px; display: flex; justify-content: space-between; align-items: center; padding: 0 22px; font-size: 14px; font-weight: 600; }
    .status .icons { display: flex; align-items: center; gap: 8px; }
    .content { padding: 22px 20px 16px; }
    .head { display: flex; align-items: center; gap: 10px; font-size: 20px; font-weight: 700; margin-bottom: 16px; }
    .card { background: #fff; border-radius: 18px; padding: 18px; box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06); }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 13px; color: #6b7280; margin-bottom: 7px; }
    .input { display: flex; align-items: center; gap: 10px; background: #f7f9fd; border: 1px solid #e8edf7; border-radius: 12px; padding: 12px; color: #94a3b8; }
    .input input { border: none; outline: none; width: 100%; background: transparent; font-size: 14px; font-family: inherit; }
    .btn { width: 100%; border: none; border-radius: 14px; padding: 14px 0; color: #fff; background: linear-gradient(135deg, #2f80ed, #4facfe); font-size: 16px; font-weight: 600; margin-top: 8px; cursor: pointer; }
    .home-indicator { position:absolute; left:50%; transform:translateX(-50%); bottom:6px; width:128px; height:5px; border-radius:999px; background:rgba(17,24,39,.75); z-index:5; }
  </style>
</head>
<body>
  <div class="phone">
    <div class="screen">
      <div class="status">
        <span>9:41</span>
        <div class="icons"><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-full"></i></div>
      </div>
      <div class="content">
        <div class="head"><i class="fa-solid fa-angle-left" onclick="window.location.href='login.html'" style="cursor:pointer;"></i><span>注册账号</span></div>
        <div class="card">
          <div class="field"><label>手机号</label><div class="input"><i class="fa-solid fa-phone"></i><input placeholder="请输入手机号" /></div></div>
          <div class="field"><label>验证码</label><div class="input"><i class="fa-solid fa-key"></i><input placeholder="请输入验证码" /></div></div>
          <div class="field"><label>设置密码</label><div class="input"><i class="fa-solid fa-lock"></i><input type="password" placeholder="6-20位密码" /></div></div>
          <button class="btn" onclick="window.location.href='home.html'">注册并登录</button>
        </div>
      </div>
      <div class="home-indicator"></div>
    </div>
  </div>
</body>
</html>
