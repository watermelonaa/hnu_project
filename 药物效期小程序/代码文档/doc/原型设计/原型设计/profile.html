<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>药物效期管家 - 个人中心</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Alibaba PuHuiTi", "PingFang SC", "Helvetica Neue", sans-serif; background: #edf2fb; min-height: 100vh; display: grid; place-items: center; color: #1f2937; }
    .phone { width: 393px; height: 852px; border-radius: 52px; padding: 12px; background: linear-gradient(180deg, #22252b 0%, #13161b 100%); box-shadow: 0 24px 70px rgba(15, 23, 42, 0.35); border: 1px solid #0f1115; }
    .screen { width: 100%; height: 100%; border-radius: 40px; background: #f5f8fd; overflow: hidden; position: relative; }
    .screen::before { content:""; position:absolute; top:8px; left:50%; transform:translateX(-50%); width:116px; height:28px; border-radius:18px; background:#0f1115; z-index:3; }
    .status { height: 44px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; font-size: 14px; font-weight: 600; }
    .status .icons { display: flex; align-items: center; gap: 8px; }
    .head { padding: 8px 16px 10px; font-size: 24px; font-weight: 700; }
    .content { padding: 0 16px 132px; height: 720px; overflow: auto; }
    .user {
      background: linear-gradient(135deg,#2f80ed,#4facfe);
      border-radius: 20px; color: #fff; padding: 16px; margin-bottom: 12px;
      display: flex; align-items: center; gap: 12px;
    }
    .user img { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,.65); }
    .user p { font-size: 12px; opacity: .9; margin-top: 4px; }
    .stats {
      display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; margin-bottom: 12px;
    }
    .stats .s { background: #fff; border-radius: 14px; text-align: center; padding: 12px 6px; box-shadow: 0 8px 20px rgba(15,23,42,.05); }
    .s strong { display: block; font-size: 18px; margin-bottom: 4px; color: #2563eb; }
    .s span { font-size: 12px; color: #64748b; }
    .group { background: #fff; border-radius: 16px; margin-bottom: 10px; box-shadow: 0 8px 20px rgba(15,23,42,.05); overflow: hidden; }
    .row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 12px; font-size: 14px; border-bottom: 1px solid #eef2f7;
      cursor: pointer;
    }
    .row:last-child { border-bottom: none; }
    .left { display: flex; align-items: center; gap: 10px; }
    .left i { color: #3b82f6; width: 18px; text-align: center; }
    .right { color: #94a3b8; font-size: 13px; }
    .tabbar {
      position: absolute; left: 12px; right: 12px; bottom: 34px;
      background: rgba(255,255,255,.95); border-radius: 20px;
      display: grid; grid-template-columns: repeat(4,1fr); padding: 10px 0 8px;
      box-shadow: 0 8px 30px rgba(15, 23, 42, 0.12);
    }
    .tab { text-align: center; font-size: 11px; color: #64748b; text-decoration: none; }
    .tab i { display: block; font-size: 18px; margin-bottom: 4px; }
    .tab.active { color: #2563eb; font-weight: 600; }
    .home-indicator { position:absolute; left:50%; transform:translateX(-50%); bottom:10px; width:128px; height:5px; border-radius:999px; background:rgba(17,24,39,.75); z-index:5; }
  </style>
</head>
<body>
  <div class="phone">
    <div class="screen">
      <div class="status">
        <span>9:41</span>
        <div class="icons"><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-full"></i></div>
      </div>
      <div class="head">个人中心</div>
      <div class="content">
        <section class="user">
          <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&w=120&q=80" alt="user" />
          <div>
            <h3>林小夏</h3>
            <p>药物管理助手已开启</p>
          </div>
        </section>
        <section class="stats">
          <div class="s"><strong id="totalCount">0</strong><span>总录入</span></div>
          <div class="s"><strong id="remindCount">0</strong><span>今日提醒</span></div>
        </section>
        <section class="group">
          <div class="row" onclick="window.location.href='settings.html'" style="cursor:pointer;"><div class="left"><i class="fa-solid fa-sliders"></i><span>偏好设置</span></div><span class="right"><i class="fa-solid fa-angle-right"></i></span></div>
        </section>
        <section class="group">
          <div class="row" onclick="window.location.href='about.html'"><div class="left"><i class="fa-solid fa-circle-info"></i><span>关于我们</span></div><span class="right"><i class="fa-solid fa-angle-right"></i></span></div>
          <div class="row" onclick="window.location.href='privacy.html'"><div class="left"><i class="fa-regular fa-file-lines"></i><span>隐私协议</span></div><span class="right"><i class="fa-solid fa-angle-right"></i></span></div>
          <div class="row" onclick="window.location.href='login.html'"><div class="left"><i class="fa-solid fa-right-from-bracket"></i><span>退出登录</span></div><span class="right"><i class="fa-solid fa-angle-right"></i></span></div>
        </section>
      </div>
      <div class="tabbar">
        <a class="tab" href="home.html"><i class="fa-solid fa-house"></i>首页</a>
        <a class="tab" href="food-list.html"><i class="fa-solid fa-box-open"></i>药物</a>
        <a class="tab" href="ai-chat.html"><i class="fa-solid fa-robot"></i>AI</a>
        <a class="tab active" href="profile.html"><i class="fa-regular fa-user"></i>我的</a>
      </div>
      <div class="home-indicator"></div>
    </div>
  </div>
  <script>
    const foods = JSON.parse(localStorage.getItem("foodsData") || "[]");
    const remind = foods.filter(f => f.status === "expired" || f.status === "expiring").length;
    document.getElementById("totalCount").textContent = foods.length;
    document.getElementById("remindCount").textContent = remind;
  </script>
</body>
</html>
