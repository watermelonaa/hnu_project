services:
  # MySQL 8.4 服务
  mysql:
    image: mysql:8.4
    container_name: nlq_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: natural_language_query_system
      MYSQL_USER: nlq_user
      MYSQL_PASSWORD: nlq_pass123
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      # 挂载初始化脚本（MySQL会自动执行/docker-entrypoint-initdb.d/目录下的.sql文件，按字母顺序执行）
      - ./mysql_schema_from_last.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./sakila-schema.sql:/docker-entrypoint-initdb.d/02-sakila-schema.sql
      - ./sakila-data.sql:/docker-entrypoint-initdb.d/03-sakila-data.sql
      # 数据持久化
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --mysql-native-password=ON
    networks:
      - nlq_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB 8.2 服务
  mongodb:
    image: mongo:8.2
    container_name: nlq_mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123456
      MONGO_INITDB_DATABASE: natural_language_query_system
      TZ: Asia/Shanghai
    ports:
      - "27017:27017"
    volumes:
      # 挂载初始化脚本
      - ./mongodb_schema_from_last.js:/docker-entrypoint-initdb.d/init.js
      # 数据持久化
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - nlq_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 可选：Mongo Express (MongoDB 的 Web 管理界面)
  mongo-express:
    image: mongo-express:latest
    container_name: nlq_mongo_express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin123456
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin123456@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    depends_on:
      - mongodb
    networks:
      - nlq_network

  # 可选：Adminer (MySQL 的 Web 管理界面)
  adminer:
    image: adminer:latest
    container_name: nlq_adminer
    restart: always
    ports:
      - "8082:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    depends_on:
      - mysql
    networks:
      - nlq_network

  # Redis 缓存服务
  redis:
    image: redis:7-alpine
    container_name: nlq_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - nlq_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

# 数据卷（数据持久化）
volumes:
  mysql_data:
    driver: local
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local

# 网络配置
networks:
  nlq_network:
    driver: bridge

